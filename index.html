<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Anonymous DB | SIM Information System 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Main Container */
        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #7dd3fc;
            margin-bottom: 1rem;
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #94a3f8 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #7e8aad;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* Search Card */
        .search-card {
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            background: #0f1424;
            border: 1px solid #2d3a5e;
            padding: 1rem 1.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #e2e8ff;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .input-group input::placeholder {
            color: #5b6e9c;
        }

        .search-btn {
            background: linear-gradient(95deg, #0f2b3d, #0a1a2f);
            border: 1px solid #2b6e9e;
            padding: 0 2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #cffafe;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover {
            background: linear-gradient(95deg, #1e3a5f, #0f2a44);
            transform: scale(0.97);
            border-color: #38bdf8;
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top: 3px solid #2dd4bf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Cards */
        .result-card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
            display: none;
        }

        /* Network Header */
        .network-header {
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 2px solid;
        }

        .network-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .network-name {
            font-size: 1.3rem;
            font-weight: 800;
        }

        /* Info Rows */
        .info-row {
            display: flex;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .info-label {
            width: 100px;
            font-weight: 600;
            color: #8b9acf;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            flex: 1;
            color: #f1f5ff;
            font-weight: 500;
            word-break: break-word;
            font-size: 0.95rem;
        }

        /* Developer Footer */
        .developer-footer {
            padding: 0.8rem 1.5rem;
            background: rgba(0,0,0,0.3);
            text-align: center;
            font-size: 0.7rem;
            color: #5f7c9f;
            font-family: monospace;
            border-top: 1px solid rgba(45, 212, 191, 0.2);
        }

        /* Network Specific Colors */
        .jazz .network-header { border-bottom-color: #d32f2f; }
        .jazz .network-icon { background: rgba(211, 47, 47, 0.15); color: #d32f2f; }
        .jazz .network-name { color: #d32f2f; }

        .zong .network-header { border-bottom-color: #ff5722; }
        .zong .network-icon { background: rgba(255, 87, 34, 0.15); color: #ff5722; }
        .zong .network-name { color: #ff5722; }

        .ufone .network-header { border-bottom-color: #00bcd4; }
        .ufone .network-icon { background: rgba(0, 188, 212, 0.15); color: #00bcd4; }
        .ufone .network-name { color: #00bcd4; }

        .telenor .network-header { border-bottom-color: #4caf50; }
        .telenor .network-icon { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
        .telenor .network-name { color: #4caf50; }

        /* Error Message */
        .error-message {
            background: rgba(211, 47, 47, 0.15);
            border: 1px solid rgba(211, 47, 47, 0.3);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: #ff8a8a;
            text-align: center;
            margin-bottom: 1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #5f7c9f;
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .container { max-width: 100%; }
            .search-card { padding: 1.2rem; }
            .info-label { width: 80px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="badge">
            <i class="fas fa-shield-alt"></i> SECURE ANONYMOUS DB
        </div>
        <h1>SIM Information System</h1>
        <div class="sub">Powered by Anonymous DB | Real-time Subscriber Data</div>
    </div>

    <!-- Search Card -->
    <div class="search-card">
        <div class="input-group">
            <input type="tel" id="mobileInput" placeholder="03xxxxxxxxx (Pakistani Mobile Number)" value="03137665939">
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i> SEARCH
            </button>
        </div>
        <div style="font-size: 0.7rem; color: #5b6e9c; margin-top: 0.8rem; text-align: center;">
            <i class="fas fa-lock"></i> Secure API Proxy | No Data Stored
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div style="color: #7dd3fc; margin-top: 0.8rem; font-size: 0.8rem;">Fetching subscriber data...</div>
    </div>

    <!-- Result Area -->
    <div id="resultArea"></div>

    <!-- Footer -->
    <div class="footer">
        <i class="fas fa-database"></i> developer: anonymous_db | Secure SIM Information System
    </div>
</div>

<script>
    // API Endpoint - Calls your serverless function
    const API_URL = '/api/sim-info';

    // Network detection based on mobile prefix
    function detectNetwork(mobile) {
        if (!mobile) return 'Unknown';
        const clean = mobile.toString().replace(/\D/g, '');
        const prefix = clean.substring(0, 4);
        
        const jazzPrefixes = ['0300', '0301', '0302', '0303', '0304', '0305', '0306', '0307', '0308', '0309', '0310', '0311', '0312', '0313', '0314', '0315', '0320', '0321', '0322', '0323', '0324'];
        const zongPrefixes = ['0316', '0317', '0318', '0319', '0336', '0337', '0338', '0350', '0370'];
        const ufonePrefixes = ['0330', '0331', '0332', '0333', '0334', '0335', '0340', '0341', '0342', '0343', '0344', '0345', '0346', '0347', '0348'];
        const telenorPrefixes = ['0349', '030', '034', '0351', '0352', '0353', '0354', '0355', '0356', '0357', '0358', '0359'];
        
        if (jazzPrefixes.some(p => prefix.startsWith(p))) return 'Jazz';
        if (zongPrefixes.some(p => prefix.startsWith(p))) return 'Zong';
        if (ufonePrefixes.some(p => prefix.startsWith(p))) return 'Ufone';
        if (telenorPrefixes.some(p => prefix.startsWith(p))) return 'Telenor';
        
        // Additional checks
        if (prefix.startsWith('031')) return 'Jazz';
        if (prefix.startsWith('032')) return 'Jazz';
        if (prefix.startsWith('033')) return 'Ufone';
        if (prefix.startsWith('034')) return 'Ufone';
        
        return 'Unknown';
    }

    // Get network icon
    function getNetworkIcon(network) {
        const icons = {
            'Jazz': 'fa-music',
            'Zong': 'fa-globe',
            'Ufone': 'fa-phone',
            'Telenor': 'fa-tower-broadcast',
            'Unknown': 'fa-sim-card'
        };
        return icons[network] || 'fa-mobile-alt';
    }

    // Render result with network-specific styling
    function renderResult(data, mobileNumber) {
        const resultArea = document.getElementById('resultArea');
        
        if (!data.success || !data.records || data.records.length === 0) {
            resultArea.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> No subscriber data found for ${escapeHtml(mobileNumber)}
                </div>
            `;
            return;
        }
        
        const record = data.records[0];
        const network = detectNetwork(record.mobile || mobileNumber);
        const networkIcon = getNetworkIcon(network);
        
        // Create network-specific card
        const html = `
            <div class="result-card ${network.toLowerCase()}" id="resultCard">
                <div class="network-header">
                    <div class="network-icon">
                        <i class="fas ${networkIcon}"></i>
                    </div>
                    <div class="network-name">
                        ${network} Network
                    </div>
                    <div style="margin-left: auto; font-size: 0.7rem; color: #7e8aad;">
                        <i class="fas fa-check-circle" style="color: #2dd4bf;"></i> VERIFIED
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-user"></i> NAME
                    </div>
                    <div class="info-value">
                        ${escapeHtml(record.name || 'Not Available')}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-mobile-alt"></i> MOBILE
                    </div>
                    <div class="info-value">
                        ${escapeHtml(record.mobile || mobileNumber)}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-id-card"></i> CNIC
                    </div>
                    <div class="info-value">
                        ${escapeHtml(record.cnic || 'Not Disclosed')}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-location-dot"></i> ADDRESS
                    </div>
                    <div class="info-value">
                        ${escapeHtml(record.address || '—')}
                    </div>
                </div>
                
                <div class="developer-footer">
                    <i class="fas fa-code"></i> developer: anonymous_db | ${new Date(data.timestamp || Date.now()).toLocaleString()}
                </div>
            </div>
        `;
        
        resultArea.innerHTML = html;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Validate Pakistani mobile number
    function validateMobileNumber(number) {
        if (!number) return false;
        const cleaned = number.toString().trim().replace(/\s+|-/g, '');
        const pakMobileRegex = /^03\d{9}$/;
        return pakMobileRegex.test(cleaned);
    }

    // Show error message
    function showError(message) {
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> ${escapeHtml(message)}
            </div>
        `;
    }

    // Main search function - Calls YOUR API
    async function searchSimInfo(mobileNumber) {
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        
        // Clear previous results
        resultArea.innerHTML = '';
        loader.style.display = 'block';
        
        // Clean mobile number
        const cleanMobile = mobileNumber.toString().trim();
        
        try {
            // Call YOUR API endpoint (Vercel serverless function)
            const response = await fetch(`${API_URL}?search=${encodeURIComponent(cleanMobile)}`);
            
            if (!response.ok) {
                throw new Error(`API responded with status ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.success) {
                renderResult(data, cleanMobile);
            } else {
                showError(data.error || 'No subscriber data found for this number.');
            }
            
        } catch (error) {
            console.error('Search error:', error);
            showError('Network error or unable to reach API. Please try again.');
        } finally {
            loader.style.display = 'none';
        }
    }

    // Event listeners
    const searchBtn = document.getElementById('searchBtn');
    const mobileInput = document.getElementById('mobileInput');
    
    searchBtn.addEventListener('click', () => {
        const mobile = mobileInput.value.trim();
        if (!validateMobileNumber(mobile)) {
            showError('Invalid Pakistani mobile number! Use format: 03xxxxxxxxx (11 digits)');
            return;
        }
        searchSimInfo(mobile);
    });
    
    mobileInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });
    
    // Auto-search on load (optional)
    window.addEventListener('load', () => {
        // Pre-fill example
        mobileInput.value = '03137665939';
    });
</script>
</body>
</html>
