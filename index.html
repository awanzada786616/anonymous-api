<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Anonymous DB | SIM Information System 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #7dd3fc;
            margin-bottom: 1rem;
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #94a3f8 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #7e8aad;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .search-card {
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            background: #0f1424;
            border: 1px solid #2d3a5e;
            padding: 1rem 1.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #e2e8ff;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .input-group input::placeholder {
            color: #5b6e9c;
        }

        .search-btn {
            background: linear-gradient(95deg, #0f2b3d, #0a1a2f);
            border: 1px solid #2b6e9e;
            padding: 0 2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #cffafe;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover {
            background: linear-gradient(95deg, #1e3a5f, #0f2a44);
            transform: scale(0.97);
            border-color: #38bdf8;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top: 3px solid #2dd4bf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
            display: block;
        }

        .network-header {
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 2px solid;
        }

        .network-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .network-name {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .info-row {
            display: flex;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .info-label {
            width: 100px;
            font-weight: 600;
            color: #8b9acf;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            flex: 1;
            color: #f1f5ff;
            font-weight: 500;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .developer-footer {
            padding: 0.8rem 1.5rem;
            background: rgba(0,0,0,0.3);
            text-align: center;
            font-size: 0.7rem;
            color: #5f7c9f;
            font-family: monospace;
            border-top: 1px solid rgba(45, 212, 191, 0.2);
        }

        /* Network Colors */
        .jazz .network-header { border-bottom-color: #d32f2f; }
        .jazz .network-icon { background: rgba(211, 47, 47, 0.15); color: #d32f2f; }
        .jazz .network-name { color: #d32f2f; }

        .zong .network-header { border-bottom-color: #ff5722; }
        .zong .network-icon { background: rgba(255, 87, 34, 0.15); color: #ff5722; }
        .zong .network-name { color: #ff5722; }

        .ufone .network-header { border-bottom-color: #00bcd4; }
        .ufone .network-icon { background: rgba(0, 188, 212, 0.15); color: #00bcd4; }
        .ufone .network-name { color: #00bcd4; }

        .telenor .network-header { border-bottom-color: #4caf50; }
        .telenor .network-icon { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
        .telenor .network-name { color: #4caf50; }

        .error-message {
            background: rgba(211, 47, 47, 0.15);
            border: 1px solid rgba(211, 47, 47, 0.3);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: #ff8a8a;
            text-align: center;
            margin-bottom: 1rem;
        }

        .debug-info {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: #7e8aad;
            margin-top: 1rem;
            font-family: monospace;
            display: none;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #5f7c9f;
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .container { max-width: 100%; }
            .search-card { padding: 1.2rem; }
            .info-label { width: 80px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">
            <i class="fas fa-shield-alt"></i> SECURE ANONYMOUS DB
        </div>
        <h1>SIM Information System</h1>
        <div class="sub">Powered by Anonymous DB | Real-time Subscriber Data</div>
    </div>

    <div class="search-card">
        <div class="input-group">
            <input type="tel" id="mobileInput" placeholder="03xxxxxxxxx (Pakistani Mobile Number)" value="03137665939">
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i> SEARCH
            </button>
        </div>
        <div style="font-size: 0.7rem; color: #5b6e9c; margin-top: 0.8rem; text-align: center;">
            <i class="fas fa-lock"></i> Secure API Proxy | No Data Stored
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div style="color: #7dd3fc; margin-top: 0.8rem; font-size: 0.8rem;">Fetching subscriber data...</div>
    </div>

    <div id="resultArea"></div>
    
    <!-- Debug panel (hidden by default, shows API response) -->
    <div id="debugInfo" class="debug-info"></div>

    <div class="footer">
        <i class="fas fa-database"></i> developer: anonymous_db | Secure SIM Information System
    </div>
</div>

<script>
    // API Endpoint - Your Vercel serverless function
    const API_URL = '/api/sim-info';
    
    // Detect network based on mobile prefix
    function detectNetwork(mobile) {
        if (!mobile) return 'Unknown';
        const clean = mobile.toString().replace(/\D/g, '');
        const prefix = clean.substring(3, 6);
        
        console.log('Detecting network for prefix:', prefix);
        
        // Jazz prefixes
        const jazzPrefixes = ['300', '301', '302', '303', '304', '305', '306', '307', '308', '309', 
                              '310', '311', '312', '313', '314', '315', '320', '321', '322', '323', '324', '325'];
        
        // Zong prefixes
        const zongPrefixes = ['316', '317', '318', '319', '336', '337', '338', '350', '370'];
        
        // Ufone prefixes
        const ufonePrefixes = ['330', '331', '332', '333', '334', '335', '340', '341', '342', '343', 
                               '344', '345', '346', '347', '348'];
        
        if (jazzPrefixes.includes(prefix)) return 'Jazz';
        if (zongPrefixes.includes(prefix)) return 'Zong';
        if (ufonePrefixes.includes(prefix)) return 'Ufone';
        
        // Additional checks
        if (clean.startsWith('031')) {
            const subPrefix = clean.substring(4, 6);
            if (subPrefix === '16' || subPrefix === '17' || subPrefix === '18' || subPrefix === '19') return 'Zong';
            return 'Jazz';
        }
        if (clean.startsWith('033')) return 'Ufone';
        if (clean.startsWith('034')) return 'Ufone';
        
        return 'Telenor';
    }

    function getNetworkIcon(network) {
        const icons = {
            'Jazz': 'fa-music',
            'Zong': 'fa-globe',
            'Ufone': 'fa-phone',
            'Telenor': 'fa-tower-broadcast',
            'Unknown': 'fa-sim-card'
        };
        return icons[network] || 'fa-mobile-alt';
    }

    function escapeHtml(str) {
        if (!str) return 'N/A';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showError(message) {
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> ${escapeHtml(message)}
            </div>
        `;
    }

    function renderResult(data, mobileNumber) {
        const resultArea = document.getElementById('resultArea');
        
        console.log('Rendering data:', data);
        
        // Check if data is valid
        if (!data) {
            showError('No data received from API');
            return;
        }
        
        // Extract records - API returns { success, count, records: [...] }
        let records = null;
        
        if (data.records && Array.isArray(data.records) && data.records.length > 0) {
            records = data.records;
        } else if (data.data && Array.isArray(data.data) && data.data.length > 0) {
            records = data.data;
        } else if (data.record) {
            records = [data.record];
        }
        
        if (!records || records.length === 0) {
            showError(`No subscriber data found for ${escapeHtml(mobileNumber)}`);
            return;
        }
        
        const record = records[0];
        console.log('Record found:', record);
        
        const mobile = record.mobile || mobileNumber;
        const network = detectNetwork(mobile);
        const networkIcon = getNetworkIcon(network);
        
        const name = record.name || record.full_name || record.customer_name || 'Not Available';
        const cnic = record.cnic || record.id_number || record.cnic_number || 'Not Disclosed';
        const address = record.address || record.full_address || 'Not Available';
        
        const html = `
            <div class="result-card ${network.toLowerCase()}" id="resultCard">
                <div class="network-header">
                    <div class="network-icon">
                        <i class="fas ${networkIcon}"></i>
                    </div>
                    <div class="network-name">
                        ${network} Network
                    </div>
                    <div style="margin-left: auto; font-size: 0.7rem; color: #7e8aad;">
                        <i class="fas fa-check-circle" style="color: #2dd4bf;"></i> VERIFIED
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-user"></i> NAME
                    </div>
                    <div class="info-value">
                        ${escapeHtml(name)}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-mobile-alt"></i> MOBILE
                    </div>
                    <div class="info-value">
                        ${escapeHtml(mobile)}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-id-card"></i> CNIC
                    </div>
                    <div class="info-value">
                        ${escapeHtml(cnic)}
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="info-label">
                        <i class="fas fa-location-dot"></i> ADDRESS
                    </div>
                    <div class="info-value">
                        ${escapeHtml(address)}
                    </div>
                </div>
                
                <div class="developer-footer">
                    <i class="fas fa-code"></i> developer: anonymous_db | ${new Date().toLocaleString()}
                </div>
            </div>
        `;
        
        resultArea.innerHTML = html;
        
        // Show debug info (hidden by default - press F12 to see)
        const debugDiv = document.getElementById('debugInfo');
        debugDiv.style.display = 'block';
        debugDiv.innerHTML = `<strong>🔍 API Response (Debug):</strong><br><pre style="font-size:0.65rem; overflow-x:auto;">${JSON.stringify(data, null, 2)}</pre>`;
    }

    function validateMobileNumber(number) {
        if (!number) return false;
        const cleaned = number.toString().trim().replace(/\s+|-/g, '');
        const pakMobileRegex = /^03\d{9}$/;
        return pakMobileRegex.test(cleaned);
    }

    async function searchSimInfo(mobileNumber) {
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        const debugDiv = document.getElementById('debugInfo');
        
        resultArea.innerHTML = '';
        debugDiv.style.display = 'none';
        loader.style.display = 'block';
        
        const cleanMobile = mobileNumber.toString().trim();
        
        try {
            const apiUrl = `${API_URL}?search=${encodeURIComponent(cleanMobile)}`;
            console.log('Calling API:', apiUrl);
            
            const response = await fetch(apiUrl);
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`API responded with status ${response.status}`);
            }
            
            const data = await response.json();
            console.log('API Response:', data);
            
            if (data.success === true) {
                renderResult(data, cleanMobile);
            } else {
                showError(data.error || data.message || 'No subscriber data found for this number.');
            }
            
        } catch (error) {
            console.error('Search error:', error);
            showError('Network error: ' + error.message);
        } finally {
            loader.style.display = 'none';
        }
    }

    // Event listeners
    const searchBtn = document.getElementById('searchBtn');
    const mobileInput = document.getElementById('mobileInput');
    
    searchBtn.addEventListener('click', () => {
        const mobile = mobileInput.value.trim();
        if (!validateMobileNumber(mobile)) {
            showError('Invalid Pakistani mobile number! Use format: 03xxxxxxxxx (11 digits)');
            return;
        }
        searchSimInfo(mobile);
    });
    
    mobileInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });
    
    // Test on page load
    window.addEventListener('load', () => {
        console.log('Page loaded, ready to search');
        // Auto-search example number
        setTimeout(() => {
            if (mobileInput.value === '03137665939') {
                searchSimInfo('03137665939');
            }
        }, 500);
    });
</script>
</body>
</html>
